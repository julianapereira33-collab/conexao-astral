<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Obrigado — Conexão Astral</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Georgia', serif;
      background: #0a0014;
      color: #e8d5ff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
    }
    h1 {
      font-size: 2.5rem;
      color: #c9a0ff;
      margin-bottom: 1rem;
    }
    p {
      font-size: 1.2rem;
      line-height: 1.8;
      margin-bottom: 1.5rem;
      color: #d4b8ff;
    }
    .icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
    }
    .email-info {
      background: rgba(201, 160, 255, 0.1);
      border: 1px solid rgba(201, 160, 255, 0.3);
      border-radius: 12px;
      padding: 1.5rem;
      margin-top: 2rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">✨</div>
    <h1>Obrigado pela sua compra!</h1>
    <p>Seu Mapa Astral Personalizado está sendo preparado com muito cuidado e dedicação.</p>
    <div class="email-info">
      <p>📧 Em breve você receberá seu mapa completo no e-mail informado.</p>
      <p>Verifique também sua caixa de spam, caso não encontre em alguns minutos.</p>
    </div>
  </div>
</body>
</html>
