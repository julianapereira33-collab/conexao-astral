  const q = QUESTIONS[state.step];
  const pct = Math.round((state.step / QUESTIONS.length) * 100);
  prog.style.display = 'block';
  document.getElementById('stepLabel').textContent = `Pergunta ${state.step + 1} de ${QUESTIONS.length}`;
  document.getElementById('pct').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';
  social.style.display = state.step < 2 ? 'flex' : 'none';
  card.classList.remove('fade-in');
  void card.offsetWidth;
  let html = '';
  if (q.emoji) html += `<span class="q-emoji">${q.emoji}</span>`;
  if (q.label) html += `<div class="q-label">${q.label}</div>`;
  html += `<div class="q-text">${q.text}</div>`;
  if (q.sub) html += `<p class="q-sub">${q.sub}</p>`;
  if (q.type === 'options') {
    const gridClass = q.cols === 2 ? 'options-grid cols-2' : 'options-grid';
    html += `<div class="${gridClass}">`;
    q.options.forEach((opt, i) => {
      const sel = state.answers[q.id] === i ? 'selected' : '';
      const parts = opt.text.split('\n');
      html += `<button class="option-btn ${sel}" onclick="selectOption('${q.id}', ${i}, this)">`;
      if (opt.icon) html += `<span class="option-icon">${opt.icon}</span>`;
      html += `<strong>${parts[0]}</strong>`;
      if (parts[1]) html += `<br><span style="font-size:11px;opacity:0.6;">${parts[1]}</span>`;
      html += `</button>`;
    });
    html += `</div>`;
    html += `<button class="btn-next" id="btnNext" onclick="nextStep()" ${state.answers[q.id] === undefined ? 'disabled' : ''}>Continuar →</button>`;
  }
  else if (q.type === 'inputs') {
    html += `<div class="input-group">`;
    q.fields.forEach(f => {
      html += `<div>
        <label class="input-label">${f.label}</label>
        <input class="input-field" id="f_${f.id}" type="${f.type}" placeholder="${f.placeholder}"
          value="${state.answers[f.id] || ''}"
          oninput="handleInput('${f.id}')" />
      </div>`;
    });
    html += `</div>`;
    html += `<button class="btn-next" id="btnNext" onclick="nextStep()" style="margin-top:20px;">Continuar →</button>`;
  }
  else if (q.type === 'birth') {
    const savedHora = state.answers['hora_tipo'] || '';
    html += `<div class="input-group">
      <div>
        <label class="input-label">Data de nascimento</label>
        <input class="input-field" id="f_data_nascimento" type="text" placeholder="DD/MM/AAAA"
          value="${state.answers['data_nascimento'] || ''}"
          oninput="handleInput('data_nascimento')" maxlength="10" />
      </div>
      <div>
        <label class="input-label">Cidade de nascimento</label>
        <input class="input-field" id="f_cidade_nascimento" type="text" placeholder="Ex: São Paulo, SP"
          value="${state.answers['cidade_nascimento'] || ''}"
          oninput="handleInput('cidade_nascimento')" />
      </div>
      <div>
        <label class="input-label">Horário de nascimento</label>
        <div class="hora-group">
          <button class="hora-toggle ${savedHora === 'sei' ? 'active' : ''}" onclick="setHoraTipo('sei')">Sei o horário</button>
          <button class="hora-toggle ${savedHora === 'aprox' ? 'active' : ''}" onclick="setHoraTipo('aprox')">Aproximado</button>
          <button class="hora-toggle ${savedHora === 'nao' ? 'active' : ''}" onclick="setHoraTipo('nao')">Não sei</button>
          <button class="hora-toggle ${savedHora === 'certidao' ? 'active' : ''}" onclick="setHoraTipo('certidao')">Ver certidão</button>
        </div>
        <div id="horaInputWrap" style="margin-top:8px;display:${savedHora === 'sei' || savedHora === 'aprox' ? 'block' : 'none'}">
          <input class="input-field" id="f_hora_nascimento" type="text" placeholder="Ex: 14:30"
            value="${state.answers['hora_nascimento'] || ''}"
            oninput="handleInput('hora_nascimento')" maxlength="5" />
          ${savedHora === 'aprox' ? '<p class="input-hint" style="margin-top:6px;">Tudo bem — usaremos para refinar o Ascendente</p>' : ''}
        </div>
        ${savedHora === 'nao' ? '<p class="input-hint" style="margin-top:6px;">Sem problema! Seu mapa será gerado com as informações disponíveis.</p>' : ''}
      </div>
    </div>`;
    html += `<button class="btn-next" id="btnNext" onclick="nextStep()" style="margin-top:20px;">Continuar →</button>`;
  }
  else if (q.type === 'email_capture') {
    html += `<div class="input-group">
      <div>
        <input class="input-field" id="f_email" type="email" placeholder="seu@email.com"
          value="${state.answers['email'] || ''}"
          oninput="handleInput('email')" />
        <p class="input-hint" style="margin-top:8px;">Seu PDF é entregue neste endereço em até 10 minutos</p>
      </div>
    </div>`;
    html += `<button class="btn-next" id="btnNext" onclick="goToResult()" style="margin-top:20px;">Ver meu resultado →</button>`;
  }
  card.innerHTML = html;
  card.classList.add('fade-in');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function selectOption(qId, idx, el) {
  state.answers[qId] = idx;
  document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  const btn = document.getElementById('btnNext');
  if (btn) btn.disabled = false;
}
function handleInput(fieldId) {
  const el = document.getElementById('f_' + fieldId);
  if (el) {
    let val = el.value;
    if (fieldId === 'data_nascimento') {
      val = val.replace(/\D/g,'');
      if (val.length > 2) val = val.slice(0,2) + '/' + val.slice(2);
      if (val.length > 5) val = val.slice(0,5) + '/' + val.slice(5);
      if (val.length > 10) val = val.slice(0,10);
      el.value = val;
    }
    if (fieldId === 'hora_nascimento') {
      val = val.replace(/\D/g,'');
      if (val.length > 2) val = val.slice(0,2) + ':' + val.slice(2);
      if (val.length > 5) val = val.slice(0,5);
      el.value = val;
    }
    state.answers[fieldId] = el.value;
  }
}
function setHoraTipo(tipo) {
  state.answers['hora_tipo'] = tipo;
  renderStep();
}
function nextStep() {
  const q = QUESTIONS[state.step];
  if (q.type === 'inputs') {
    q.fields.forEach(f => {
      const el = document.getElementById('f_' + f.id);
      if (el) state.answers[f.id] = el.value.trim();
    });
  }
  if (q.type === 'birth') {
    ['data_nascimento','cidade_nascimento','hora_nascimento'].forEach(fid => {
      const el = document.getElementById('f_' + fid);
      if (el) state.answers[fid] = el.value.trim();
    });
  }
  if (state.step === 2 && !state.leadSent && state.answers['nome'] && state.answers['whatsapp']) {
    sendLeadWebhook(false);
  }
  const card = document.getElementById('card');
  card.classList.add('fade-out');
  setTimeout(() => { state.step++; renderStep(); }, 280);
}
function goToResult() {
  const el = document.getElementById('f_email');
  if (el) state.answers['email'] = el.value.trim();
  if (!state.answers['email'] || !state.answers['email'].includes('@')) {
    el.style.borderColor = 'rgba(244,114,182,0.6)';
    el.focus();
    return;
  }
  sendLeadWebhook(false);
  const card = document.getElementById('card');
  card.classList.add('fade-out');
  setTimeout(() => { state.step = QUESTIONS.length; renderStep(); }, 280);
}
function sendLeadWebhook(comprou) {
  state.leadSent = true;
  const payload = {
    nome: state.answers['nome'] || '',
    email: state.answers['email'] || '',
    whatsapp: state.answers['whatsapp'] || '',
    data_nascimento: state.answers['data_nascimento'] || '',
    hora_nascimento: state.answers['hora_nascimento'] || '',
    cidade_nascimento: state.answers['cidade_nascimento'] || '',
    signo: calcularSigno(state.answers['data_nascimento'] || ''),
    intencao: state.answers['intencao'],
    elemento: state.answers['elemento'],
    comprou: comprou
  };
  try {
    fetch(N8N_LEAD_WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
      keepalive: true
    });
  } catch(e) {}
}
function calcularSigno(dataStr) {
  if (!dataStr) return '';
  const p = dataStr.split('/');
  if (p.length < 2) return '';
  const dia = parseInt(p[0]), mes = parseInt(p[1]);
  const s = [
    {n:'Áries',r:[[3,21],[4,19]]},{n:'Touro',r:[[4,20],[5,20]]},{n:'Gêmeos',r:[[5,21],[6,20]]},
    {n:'Câncer',r:[[6,21],[7,22]]},{n:'Leão',r:[[7,23],[8,22]]},{n:'Virgem',r:[[8,23],[9,22]]},
    {n:'Libra',r:[[9,23],[10,22]]},{n:'Escorpião',r:[[10,23],[11,21]]},{n:'Sagitário',r:[[11,22],[12,21]]},
    {n:'Capricórnio',r:[[12,22],[1,19]]},{n:'Aquário',r:[[1,20],[2,18]]},{n:'Peixes',r:[[2,19],[3,20]]}
  ];
  for (const sg of s) {
    const [[mi,di],[mf,df]] = sg.r;
    if ((mes===mi&&dia>=di)||(mes===mf&&dia<=df)) return sg.n;
  }
  return 'Capricórnio';
}
function showResult() {
  const card = document.getElementById('card');
  document.getElementById('progressTrack').style.display = 'none';
  document.getElementById('socialStrip').style.display = 'none';
  const nome = state.answers['nome'] || 'você';
  const primeiroNome = nome.split(' ')[0];
  const signo = calcularSigno(state.answers['data_nascimento'] || '');
  state.countdownEnd = Date.now() + (14 * 60 + 59) * 1000;
  startCountdown();
  card.classList.remove('fade-out');
  void card.offsetWidth;
  card.innerHTML = `
    <div class="result-teaser">
      <span class="q-emoji">🌌</span>
      <div class="q-label">Análise em processamento</div>
      <h2 class="result-teaser-title">${primeiroNome}, seu mapa está quase pronto</h2>
      <p class="result-teaser-sub">Encontramos padrões únicos na sua carta ${signo ? `de <strong style="color:var(--amethyst)">${signo}</strong>` : 'astral'}. Para revelar o resultado completo, precisamos de apenas mais um passo.</p>
      <div class="result-bars" style="position:relative;">
        <div class="result-bar-row"><div class="result-bar-label">Propósito de alma</div><div class="result-bar-track"><div class="result-bar-fill blurred" style="width:78%"></div></div></div>
        <div class="result-bar-row"><div class="result-bar-label">Padrões de amor</div><div class="result-bar-track"><div class="result-bar-fill blurred" style="width:91%"></div></div></div>
        <div class="result-bar-row"><div class="result-bar-label">Bloqueios karma</div><div class="result-bar-track"><div class="result-bar-fill blurred" style="width:64%"></div></div></div>
        <div class="result-bar-row"><div class="result-bar-label">Número de vida</div><div class="result-bar-track"><div class="result-bar-fill blurred" style="width:100%"></div></div></div>
        <div class="result-lock-overlay">
          <span class="lock-icon">🔒</span>
          <span class="lock-text">Análise completa disponível após a confirmação</span>
        </div>
      </div>
    </div>
    <div class="offer-divider"><div class="offer-divider-line"></div><span class="offer-divider-text">Oferta especial</span><div class="offer-divider-line"></div></div>
    <div class="countdown-wrap">
      <span class="countdown-label">⏳ Esta análise expira em</span>
      <span class="countdown-time" id="countdownDisplay">14:59</span>
    </div>
    <div class="offer-box">
      <div class="q-label" style="margin-bottom:10px;">O que você recebe</div>
      <div class="offer-includes">
        <div class="offer-item"><span class="offer-item-icon">☀️</span> Mapa Astral Completo — Sol, Lua, Ascendente e todos os planetas interpretados</div>
        <div class="offer-item"><span class="offer-item-icon">🔢</span> Numerologia completa — Número de Vida, Alma, Expressão e Ano Pessoal</div>
        <div class="offer-item"><span class="offer-item-icon">❤️</span> Padrões de amor — por que você atrai quem atrai e como mudar</div>
        <div class="offer-item"><span class="offer-item-icon">💼</span> Ramos com mais futuro para o seu perfil cósmico</div>
        <div class="offer-item"><span class="offer-item-icon">🔮</span> Previsão dos próximos 12 meses (trânsitos 2025–2026)</div>
        <div class="offer-item"><span class="offer-item-icon">📄</span> PDF de 40+ páginas entregue em até 10 minutos</div>
      </div>
      <div class="price-block">
        <div class="price-from">De R$497,70</div>
        <div class="price-main">R$47,90</div>
        <div class="price-period">pagamento único · Pix, cartão 3x ou boleto</div>
      </div>
    </div>
    <button class="btn-order-bump" id="bumpBtn" onclick="toggleBump()">
      <div class="bump-checkbox" id="bumpCheck"></div>
      <div>
        <div class="bump-text">💕 Adicionar <strong>Mapa de Compatibilidade Amorosa</strong> — análise completa com outra pessoa</div>
        <div class="bump-price">Apenas +R$17,90 • entregue junto ao seu mapa</div>
      </div>
    </button>
    <a id="ctaBtn" href="${CAKTO_BASE}" class="btn-cta" onclick="onCTAClick()">
      🔮 Quero meu Mapa Astral + Numerologia — R$47,90
    </a>
    <div class="guarantee">🛡 7 dias de garantia · Pagamento 100% seguro</div>
  `;
  card.classList.add('fade-in');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function toggleBump() {
  state.bumpSelected = !state.bumpSelected;
  const btn = document.getElementById('bumpBtn');
  const check = document.getElementById('bumpCheck');
  const cta = document.getElementById('ctaBtn');
  if (state.bumpSelected) {
    btn.classList.add('checked');
    check.textContent = '✓';
    cta.textContent = '🔮 Mapa Astral + Compatibilidade — R$65,80';
  } else {
    btn.classList.remove('checked');
    check.textContent = '';
    cta.textContent = '🔮 Quero meu Mapa Astral + Numerologia — R$47,90';
  }
}
function onCTAClick() { sendLeadWebhook(false); }
function startCountdown() {
  if (state.countdownInterval) clearInterval(state.countdownInterval);
  state.countdownInterval = setInterval(() => {
    const rem = Math.max(0, state.countdownEnd - Date.now());
    const m = Math.floor(rem / 60000);
    const s = Math.floor((rem % 60000) / 1000);
    const el = document.getElementById('countdownDisplay');
    if (el) el.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    if (rem === 0) clearInterval(state.countdownInterval);
  }, 1000);
}
renderStep();
</script>
</body>
</html>
